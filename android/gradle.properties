# Heap bumped for Phase B: the CometChat Calls SDK pulls heavy transitive deps
# that Jetifier rewrites; the default 2g OOMs partway through assembleDebug.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
# Required by the CometChat Chat SDK: its transitive com.android.support:*
# collides with androidx.core without Jetifier rewriting the legacy refs.
android.enableJetifier=true
android.nonTransitiveRClass=true
kotlin.code.style=official
